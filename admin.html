<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>StyleAI · Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;color:#e0e0e0;font-family:'Inter',-apple-system,sans-serif;min-height:100vh;}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:#111;border:1px solid #1e1e1e;border-radius:16px;padding:36px;width:100%;max-width:340px;}
.login-logo{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#4e7a54;margin-bottom:24px;}
.login-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:6px;}
.login-sub{font-size:13px;color:#444;margin-bottom:24px;}
.login-input{width:100%;background:#0a0a0a;border:1px solid #222;border-radius:8px;padding:11px 14px;font-size:14px;color:#fff;font-family:inherit;outline:none;margin-bottom:10px;transition:border-color .15s;}
.login-input:focus{border-color:#4e7a54;}
.login-btn{width:100%;background:#4e7a54;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;}
.login-btn:hover{background:#5d9065;}
.login-err{font-size:12px;color:#e05555;margin-bottom:10px;display:none;}

/* DASHBOARD */
.dash{display:none;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid #141414;position:sticky;top:0;background:#0a0a0a;z-index:10;}
.topbar-logo{font-size:14px;font-weight:700;color:#fff;letter-spacing:-.2px;}
.topbar-logo span{color:#4e7a54;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.btn-sm{background:#141414;border:1px solid #1e1e1e;color:#888;font-size:12px;padding:6px 14px;border-radius:7px;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-sm:hover{color:#fff;border-color:#333;}
.btn-sm.green{background:#1a2e1c;border-color:#2a4a2e;color:#4e7a54;}
.btn-sm.green:hover{background:#223a24;color:#5d9065;}
.content{padding:28px;max-width:1100px;margin:0 auto;}
.section{margin-bottom:36px;}
.section-title{font-size:10px;text-transform:uppercase;letter-spacing:1.8px;color:#3a3a3a;margin-bottom:14px;font-weight:600;}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;}
.kpi{background:#111;border:1px solid #181818;border-radius:12px;padding:18px 20px;transition:border-color .15s;}
.kpi:hover{border-color:#222;}
.kpi-val{font-size:30px;font-weight:700;line-height:1;margin-bottom:5px;font-variant-numeric:tabular-nums;letter-spacing:-.5px;}
.kpi-val.w{color:#fff;}
.kpi-val.g{color:#4e7a54;}
.kpi-val.a{color:#c9924a;}
.kpi-val.b{color:#4a7ab5;}
.kpi-lbl{font-size:11px;color:#3a3a3a;line-height:1.4;}

/* TABLE */
.table-wrap{background:#111;border:1px solid #181818;border-radius:12px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:#333;padding:10px 16px;border-bottom:1px solid #141414;font-weight:600;}
td{padding:13px 16px;border-bottom:1px solid #111;font-size:13px;color:#aaa;vertical-align:middle;}
tr:last-child td{border:none;}
tr:hover td{background:#0e0e0e;}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;}
.badge.gratis{background:#161616;color:#444;}
.badge.premium{background:#162018;color:#4e7a54;}

/* BARS */
.bars{background:#111;border:1px solid #181818;border-radius:12px;padding:20px 24px;}
.bar-row{display:flex;align-items:center;gap:14px;margin-bottom:13px;}
.bar-row:last-child{margin-bottom:0;}
.bar-lbl{font-size:12px;color:#444;width:90px;flex-shrink:0;text-transform:capitalize;}
.bar-track{flex:1;background:#161616;border-radius:3px;height:6px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;background:#4e7a54;}
.bar-n{font-size:11px;color:#333;width:24px;text-align:right;flex-shrink:0;}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:#2a2a2a;font-size:14px;}

/* STAT ROW */
.stat-row{display:flex;gap:10px;flex-wrap:wrap;}
.stat-pill{background:#111;border:1px solid #181818;border-radius:8px;padding:10px 16px;font-size:12px;color:#444;}
.stat-pill strong{color:#666;display:block;font-size:20px;font-weight:700;margin-bottom:2px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">StyleAI</div>
    <div class="login-title">Panel de administración</div>
    <div class="login-sub">Acceso restringido</div>
    <input class="login-input" type="password" id="pwd" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-err" id="loginErr">Contraseña incorrecta</div>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dash" id="dash">
  <div class="topbar">
    <div class="topbar-logo">Style<span>AI</span> <span style="color:#252525;font-weight:400;font-size:12px">Admin</span></div>
    <div class="topbar-right">
      <span id="lastRefresh" style="font-size:11px;color:#2a2a2a"></span>
      <button class="btn-sm" onclick="renderDash()">↻ Actualizar</button>
      <button class="btn-sm green" onclick="exportCSV()">⬇ CSV</button>
      <button class="btn-sm" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="content" id="dashContent"></div>
</div>

<script>
const PASS = 'styleai2025';
const PRICE = 5.99;

function doLogin(){
  if(document.getElementById('pwd').value === PASS){
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('dash').style.display='block';
    document.getElementById('loginErr').style.display='none';
    renderDash();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('pwd').value='';
    document.getElementById('pwd').focus();
  }
}

function doLogout(){
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('dash').style.display='none';
  document.getElementById('pwd').value='';
}

document.getElementById('pwd').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });

// ── LEER DATOS DE LOCALSTORAGE DE STYLEAI ─────────────────────────────────
// IMPORTANTE: funciona solo si admin.html está en el mismo dominio que index.html
function getUsers(){
  try{ return JSON.parse(localStorage.getItem('sa_users')||'{}'); }catch{ return {}; }
}

function getArmario(email){
  try{ return JSON.parse(localStorage.getItem('sa_arm_'+email)||'[]'); }catch{ return []; }
}

function getPerfil(email){
  try{ return JSON.parse(localStorage.getItem('sa_perf_'+email)||'null'); }catch{ return null; }
}

function renderDash(){
  const users = getUsers();
  const emails = Object.keys(users);
  const now = Date.now();
  const DAY = 86400000;

  // ── MÉTRICAS ────────────────────────────────────────────────
  const total = emails.length;
  const premium = emails.filter(e=>users[e].plan==='premium').length;
  const gratis = total - premium;
  const mrr = +(premium * PRICE).toFixed(2);
  const arr = +(mrr * 12).toFixed(0);
  const conv = total>0 ? ((premium/total)*100).toFixed(1) : '0.0';

  const hoy = emails.filter(e=>(now-users[e].createdAt)<DAY).length;
  const semana = emails.filter(e=>(now-users[e].createdAt)<7*DAY).length;
  const mes30 = emails.filter(e=>(now-users[e].createdAt)<30*DAY).length;

  let totalPrendas=0;
  const conArmario = emails.filter(e=>{ const a=getArmario(e); totalPrendas+=a.length; return a.length>0; }).length;
  const conPerfil = emails.filter(e=>!!getPerfil(e)).length;
  const avgPrendas = total>0 ? (totalPrendas/total).toFixed(1) : '0';

  // Estilos
  const estiloMap={};
  emails.forEach(e=>{ const p=getPerfil(e); if(p?.estilo) estiloMap[p.estilo]=(estiloMap[p.estilo]||0)+1; });
  const estilos = Object.entries(estiloMap).sort((a,b)=>b[1]-a[1]);
  const maxEst = estilos[0]?.[1]||1;

  // Lista usuarios
  const list = emails.map(e=>({
    email:e, nombre:users[e].nombre||'-', plan:users[e].plan||'gratis',
    createdAt:users[e].createdAt,
    prendas:getArmario(e).length,
    perfil:!!getPerfil(e)
  })).sort((a,b)=>b.createdAt-a.createdAt);

  const fmt = n => n.toLocaleString('es-ES');
  const fmtDate = ts => new Date(ts).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'2-digit'});
  const fmtAgo = ts => {
    const d = now-ts;
    if(d<3600000) return Math.floor(d/60000)+'m';
    if(d<DAY) return Math.floor(d/3600000)+'h';
    if(d<7*DAY) return Math.floor(d/DAY)+'d';
    return fmtDate(ts);
  };

  document.getElementById('lastRefresh').textContent =
    'Actualizado ' + new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});

  document.getElementById('dashContent').innerHTML = `

    <div class="section">
      <div class="section-title">Negocio</div>
      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-val a">€${mrr.toFixed(2)}</div><div class="kpi-lbl">MRR</div></div>
        <div class="kpi"><div class="kpi-val a">€${fmt(arr)}</div><div class="kpi-lbl">ARR proyectado</div></div>
        <div class="kpi"><div class="kpi-val g">${premium}</div><div class="kpi-lbl">Clientes Premium</div></div>
        <div class="kpi"><div class="kpi-val b">${conv}%</div><div class="kpi-lbl">Conversión Free→Premium</div></div>
        <div class="kpi"><div class="kpi-val w">${gratis}</div><div class="kpi-lbl">Usuarios gratis</div></div>
        <div class="kpi"><div class="kpi-val w">€${total>0?(mrr/total).toFixed(2):'0.00'}</div><div class="kpi-lbl">ARPU</div></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Usuarios</div>
      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-val w">${fmt(total)}</div><div class="kpi-lbl">Total registrados</div></div>
        <div class="kpi"><div class="kpi-val g">${hoy}</div><div class="kpi-lbl">Nuevos hoy</div></div>
        <div class="kpi"><div class="kpi-val w">${semana}</div><div class="kpi-lbl">Últimos 7 días</div></div>
        <div class="kpi"><div class="kpi-val w">${mes30}</div><div class="kpi-lbl">Últimos 30 días</div></div>
        <div class="kpi"><div class="kpi-val w">${conPerfil}</div><div class="kpi-lbl">Onboarding completo</div></div>
        <div class="kpi"><div class="kpi-val w">${conArmario}</div><div class="kpi-lbl">Con armario activo</div></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Armario</div>
      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-val w">${fmt(totalPrendas)}</div><div class="kpi-lbl">Prendas totales subidas</div></div>
        <div class="kpi"><div class="kpi-val w">${avgPrendas}</div><div class="kpi-lbl">Prendas por usuario (media)</div></div>
        <div class="kpi"><div class="kpi-val b">${total>0?((conArmario/total)*100).toFixed(0):0}%</div><div class="kpi-lbl">Activación (≥1 prenda)</div></div>
      </div>
    </div>

    ${estilos.length>0 ? `
    <div class="section">
      <div class="section-title">Estilos preferidos</div>
      <div class="bars">
        ${estilos.map(([e,n])=>`
        <div class="bar-row">
          <div class="bar-lbl">${e}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(n/maxEst*100).toFixed(0)}%"></div></div>
          <div class="bar-n">${n}</div>
        </div>`).join('')}
      </div>
    </div>` : ''}

    <div class="section">
      <div class="section-title">Usuarios (${total})</div>
      ${total===0 ? '<div class="empty">Sin usuarios registrados todavía.</div>' : `
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Nombre</th><th>Email</th><th>Plan</th><th>Prendas</th><th>Perfil</th><th>Registro</th>
          </tr></thead>
          <tbody>
            ${list.map(u=>`<tr>
              <td style="color:#ddd;font-weight:500">${u.nombre}</td>
              <td style="color:#444;font-size:12px">${u.email}</td>
              <td><span class="badge ${u.plan}">${u.plan==='premium'?'⭐ Premium':'Gratis'}</span></td>
              <td style="color:${u.prendas>0?'#4e7a54':'#2a2a2a'}">${u.prendas}</td>
              <td>${u.perfil?'<span style="color:#4e7a54;font-size:15px">✓</span>':'<span style="color:#222">—</span>'}</td>
              <td style="color:#333;font-size:12px">${fmtAgo(u.createdAt)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`}
    </div>
  `;
}

function exportCSV(){
  const users=getUsers();
  const emails=Object.keys(users);
  const rows=[['Nombre','Email','Plan','Prendas','Perfil completado','Fecha registro']];
  emails.sort((a,b)=>users[b].createdAt-users[a].createdAt).forEach(e=>{
    const u=users[e];
    rows.push([
      u.nombre, e, u.plan||'gratis',
      getArmario(e).length,
      getPerfil(e)?'Sí':'No',
      new Date(u.createdAt).toLocaleDateString('es-ES')
    ]);
  });
  const csv = rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='styleai_usuarios_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}
</script>
</body>
</html>
